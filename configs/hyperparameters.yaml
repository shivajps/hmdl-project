# CLF-GWO settings — verify against actual run before citing in the paper (Section 4.3.4)
clf_gwo:
  n_pop: 30
  t_max: 100
  alpha: 0.8
  gamma: 0.1
  latency_budget_ms: 1.0
  early_stop_delta: 1.0e-4
  early_stop_patience: 15
  seeds: [7, 42, 123, 2024, 31415]

search_space:
  lstm_layers: [1, 4]
  lstm_hidden_units: [32, 512]      # step 32
  dropout: [0.1, 0.5]               # step 0.05
  learning_rate: [1.0e-5, 1.0e-2]   # log-uniform
  gcn_layers: [1, 3]
  gcn_hidden_dim: [32, 256]         # step 32